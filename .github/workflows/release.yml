name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Verify tag matches csproj version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CSPROJ_VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' ShamirSecretSharing/ShamirSecretSharing.csproj)
          if [ "$TAG_VERSION" != "$CSPROJ_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match csproj version $CSPROJ_VERSION" >&2
            exit 1
          fi

      - name: Test
        run: dotnet test -c Release

      - name: Pack
        run: dotnet pack ShamirSecretSharing/ShamirSecretSharing.csproj -c Release -o artifacts

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for $VERSION" > release-notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/*.nupkg artifacts/*.snupkg --title "$GITHUB_REF_NAME" --notes-file release-notes.md
